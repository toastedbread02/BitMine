name: Build

on:
  push:
    branches: [ main ]
    tags: [ "v*" ]
  pull_request:
  workflow_dispatch:
  release:
    types: [ created ]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            bin_name: rust_miner.exe
            asset_name: rust_miner-windows.zip
          - os: macos-latest
            bin_name: rust_miner
            asset_name: rust_miner-macos.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      # Bevy is a large dependency tree; this caches target/ and ~/.cargo
      # between runs so only the second-and-later builds are fast.
      - name: Cache cargo and build output
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path package | Out-Null
          Copy-Item target/release/${{ matrix.bin_name }} package/
          Copy-Item -Recurse assets package/assets
          Compress-Archive -Path package/* -DestinationPath ${{ matrix.asset_name }}

      - name: Package (macOS)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p package
          cp target/release/${{ matrix.bin_name }} package/
          cp -r assets package/assets
          cd package && zip -r ../${{ matrix.asset_name }} .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

      - name: Attach to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
